name: Publish @pptb/types to npm

on:
    workflow_dispatch:
        inputs:
            branch:
                description: "Branch to checkout"
                required: true
                type: string
            tag:
                description: "npm tag (latest or beta)"
                required: true
                type: string
            version:
                description: "Version to publish for @pptb/types"
                required: false
                type: string
    workflow_call:
        inputs:
            branch:
                required: true
                type: string
            tag:
                required: true
                type: string
            version:
                required: false
                type: string

permissions:
    contents: read
    id-token: write # Required for npm trusted publishing

jobs:
    publish-types:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout branch
              uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.branch }}
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  # REMOVED: registry-url (This is what causes the ENEEDAUTH error)

            - name: Get version
              id: version
              run: |
                  if [ -n "${{ inputs.version }}" ]; then
                    VERSION="${{ inputs.version }}"
                  else
                    VERSION=$(node -p "require('./package.json').version")
                  fi
                  echo "version=$VERSION" >> $GITHUB_OUTPUT

            - name: Sync @pptb/types version
              working-directory: ./packages
              run: |
                  npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

            - name: Publish @pptb/types to npm
              working-directory: ./packages
              run: |
                  npm publish --access public --tag ${{ inputs.tag }} --provenance
              env:
                  # Use an empty config to ignore the root .npmrc that you mentioned
                  NPM_CONFIG_USERCONFIG: /dev/null
