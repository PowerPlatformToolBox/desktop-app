name: "Combine Dependabot PRs"

on:
  workflow_dispatch:

concurrency:
  group: combine-prs-${{ github.repository }}
  cancel-in-progress: false

jobs:
  combine-prs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: read
      statuses: read

    steps:
      - uses: actions/github-script@v7
        id: create-combined-pr
        name: Create Combined PR
        with:
          github-token: ${{ github.token }}
          script: |
            const OWNER = context.repo.owner;
            const REPO = context.repo.repo;
            const BRANCH_PREFIX = 'dependabot';
            const COMBINE_BRANCH = 'combine-prs-branch';
            const repoFullName = `${OWNER}/${REPO}`;
            const SAFE_REF_REGEX = /^[A-Za-z0-9._/-]+$/;
            const SAFE_SHA_REGEX = /^[a-f0-9]{40}$/i;

            const sanitizeText = (value, maxLength = 200) =>
              String(value ?? '').replace(/[\r\n\t]+/g, ' ').trim().slice(0, maxLength);

            const pullLabel = (pull) => `#${pull.number} ${sanitizeText(pull.title, 120)}`;

            if (!SAFE_REF_REGEX.test(COMBINE_BRANCH) || COMBINE_BRANCH === 'main' || COMBINE_BRANCH === 'master') {
              core.setFailed('Invalid or unsafe combine branch name');
              return;
            }

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner: OWNER,
              repo: REPO,
              state: 'open'
            });

            let baseBranch = null;
            let baseBranchSHA = null;
            let candidates = [];
            let skipped = [];

            for (const pull of pulls) {
              const branch = pull.head?.ref;
              if (typeof branch !== 'string' || branch.length === 0 || !SAFE_REF_REGEX.test(branch)) {
                skipped.push(`${pullLabel(pull)} (invalid branch ref)`);
                continue;
              }
              if (!branch.startsWith(BRANCH_PREFIX)) continue;

              const authorLogin = pull.user?.login;
              if (authorLogin !== 'dependabot[bot]') {
                core.info('Skipping ' + branch + ' — author is not dependabot[bot]: ' + (authorLogin ?? 'unknown'));
                skipped.push(`${pullLabel(pull)} (author: ${sanitizeText(authorLogin ?? 'unknown', 60)})`);
                continue;
              }

              core.info('Checking green status for: ' + branch);
              const result = await github.graphql(
                `query($owner: String!, $repo: String!, $pull_number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $pull_number) {
                      commits(last: 1) {
                        nodes { commit { statusCheckRollup { state } } }
                      }
                    }
                  }
                }`,
                { owner: OWNER, repo: REPO, pull_number: pull.number }
              );
              const state = result?.repository?.pullRequest?.commits?.nodes?.[0]?.commit?.statusCheckRollup?.state ?? null;
              if (state !== 'SUCCESS') {
                core.info('Skipping ' + branch + ' — status: ' + (state ?? 'unknown'));
                skipped.push(`${pullLabel(pull)} (status: ${sanitizeText(state ?? 'unknown', 40)})`);
                continue;
              }

              const currentBase = pull.base?.ref;
              if (typeof currentBase !== 'string' || !SAFE_REF_REGEX.test(currentBase)) {
                skipped.push(`${pullLabel(pull)} (invalid base branch)`);
                continue;
              }
              if (baseBranch === null) {
                baseBranch = currentBase;
              } else if (currentBase !== baseBranch) {
                core.info('Skipping ' + branch + ' — targets ' + currentBase + ', expected ' + baseBranch);
                skipped.push(`${pullLabel(pull)} (targets ${sanitizeText(currentBase, 60)})`);
                continue;
              }

              candidates.push(pull);
            }

            if (candidates.length === 0) {
              core.setFailed('No green dependabot PRs found');
              return;
            }

            if (!baseBranch || !SAFE_REF_REGEX.test(baseBranch)) {
              core.setFailed('Resolved base branch is invalid');
              return;
            }

            // Fetch fresh base SHA
            const baseRef = await github.rest.git.getRef({
              owner: OWNER,
              repo: REPO,
              ref: 'heads/' + baseBranch
            });
            baseBranchSHA = baseRef.data.object.sha;

            // Create or hard-reset the combine branch to the current base SHA
            try {
              await github.rest.git.createRef({
                owner: OWNER,
                repo: REPO,
                ref: 'refs/heads/' + COMBINE_BRANCH,
                sha: baseBranchSHA
              });
              core.info('Created ' + COMBINE_BRANCH);
            } catch (err) {
              if (err.status === 422) {
                const existingCombinedPrs = await github.rest.pulls.list({
                  owner: OWNER,
                  repo: REPO,
                  state: 'open',
                  head: OWNER + ':' + COMBINE_BRANCH,
                });

                const mismatchedBase = existingCombinedPrs.data.find((pr) => pr.base.ref !== baseBranch);
                if (mismatchedBase) {
                  core.setFailed('Existing combine PR targets a different base branch; refusing force update');
                  return;
                }

                await github.rest.git.updateRef({
                  owner: OWNER,
                  repo: REPO,
                  ref: 'heads/' + COMBINE_BRANCH,
                  sha: baseBranchSHA,
                  force: true
                });
                core.info('Reset ' + COMBINE_BRANCH + ' to base SHA');
              } else {
                core.setFailed('Failed to create/reset branch: ' + err.message);
                return;
              }
            }

            // Merge each candidate into the combine branch
            const merged = [];
            const failed = [];
            for (const pull of candidates) {
              const headRef = pull.head?.sha;

              if (typeof headRef !== 'string' || headRef.length === 0) {
                failed.push(`${pullLabel(pull)} (missing head SHA)`);
                core.warning('Skipping merge for PR #' + pull.number + ' due to missing head SHA');
                continue;
              }

              if (!SAFE_SHA_REGEX.test(headRef)) {
                failed.push(`${pullLabel(pull)} (invalid commit SHA)`);
                core.warning('Skipping merge for PR #' + pull.number + ' due to invalid commit SHA');
                continue;
              }

              try {
                await github.rest.repos.merge({
                  owner: OWNER,
                  repo: REPO,
                  base: COMBINE_BRANCH,
                  head: headRef
                });
                merged.push(pullLabel(pull));
                core.info('Merged ' + headRef);
              } catch (err) {
                failed.push(`${pullLabel(pull)} (${sanitizeText(err.message, 120)})`);
                core.warning('Failed to merge ' + headRef + ': ' + sanitizeText(err.message, 120));
              }
            }

            if (merged.length === 0) {
              core.setFailed('All merges failed:\n' + failed.join('\n'));
              return;
            }

            // Build PR body
            let body = '✅ Combined the following dependabot PRs:\n' + merged.join('\n');
            if (failed.length > 0) body += '\n\n⚠️ Failed to merge:\n' + failed.join('\n');
            if (skipped.length > 0) body += '\n\n⏭️ Skipped:\n' + skipped.join('\n');

            // Create or update the combined PR
            const existing = await github.rest.pulls.list({
              owner: OWNER,
              repo: REPO,
              state: 'open',
              head: OWNER + ':' + COMBINE_BRANCH,
              base: baseBranch
            });

            if (existing.data.length > 0) {
              await github.rest.pulls.update({
                owner: OWNER,
                repo: REPO,
                pull_number: existing.data[0].number,
                title: 'chore: combine dependabot PRs',
                body
              });
              core.info('Updated PR #' + existing.data[0].number);
            } else {
              const pr = await github.rest.pulls.create({
                owner: OWNER,
                repo: REPO,
                title: 'chore: combine dependabot PRs',
                head: COMBINE_BRANCH,
                base: baseBranch,
                body
              });
              core.info('Created PR #' + pr.data.number);
            }
