name: "Combine Dependabot PRs"

on:
  workflow_dispatch:

jobs:
  combine-prs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Combine PRs
        uses: github/combine-prs@v5.2.0
        with:
          branch_prefix: 'dependabot'
